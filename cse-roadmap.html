<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSE Roadmap</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00ff88">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CSE Roadmap">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#060610;--bg2:#0d0d1f;--card:#111128;--border:#22224a;--green:#00ff88;--blue:#4488ff;--orange:#ff8844;--pink:#ff44aa;--yellow:#ffcc00;--text:#e0e0ff;--muted:#6060a0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 10% 10%,rgba(0,255,136,0.06) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 90% 90%,rgba(68,136,255,0.06) 0%,transparent 60%);pointer-events:none;z-index:0;}
nav{position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0.9rem 1.2rem;background:rgba(6,6,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:700;color:var(--green);}
.logo span{color:var(--text);}
.nav-right{display:flex;align-items:center;gap:0.5rem;}
.nav-tab{padding:0.4rem 0.9rem;border-radius:8px;border:1px solid transparent;background:none;color:var(--muted);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.8rem;font-weight:600;transition:all 0.2s;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{background:var(--green);color:var(--bg);border-color:var(--green);}
.prog-chip{font-family:'JetBrains Mono',monospace;font-size:0.72rem;padding:0.28rem 0.7rem;border-radius:999px;background:rgba(0,255,136,0.1);color:var(--green);border:1px solid rgba(0,255,136,0.2);}
main{position:relative;z-index:1;}
.page{display:none;}
.page.active{display:block;animation:fadeUp 0.3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.roadmap-page{padding:1.2rem;max-width:1000px;margin:0 auto;}
.hero{padding:2rem 0 1.5rem;}
.hero h1{font-family:'JetBrains Mono',monospace;font-size:clamp(1.5rem,5vw,2.8rem);font-weight:700;line-height:1.2;}
.hero h1 .g{color:var(--green);}
.hero h1 .b{color:var(--blue);}
.hero p{color:var(--muted);margin-top:0.5rem;font-size:0.88rem;}
.stats-row{display:flex;gap:1rem;margin:1.2rem 0;flex-wrap:wrap;}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0.8rem 1.2rem;text-align:center;}
.stat-num{font-family:'JetBrains Mono',monospace;font-size:1.6rem;font-weight:700;color:var(--green);}
.stat-lbl{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:0.15rem;}
.prog-bar{margin-bottom:1.5rem;}
.prog-top{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--muted);margin-bottom:0.4rem;}
.prog-track{height:5px;background:var(--border);border-radius:999px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));border-radius:999px;transition:width 0.6s ease;}
.level-tabs{display:flex;gap:0.4rem;margin-bottom:1.2rem;flex-wrap:wrap;}
.ltab{padding:0.35rem 1rem;border-radius:999px;border:1.5px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.78rem;font-weight:600;transition:all 0.2s;}
.ltab.active{background:var(--green);color:var(--bg);border-color:var(--green);}
.topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:0.9rem;}
.tcard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.1rem;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden;}
.tcard:hover{transform:translateY(-3px);box-shadow:0 10px 35px rgba(0,255,136,0.1);border-color:rgba(0,255,136,0.4);}
.tcard.done{border-color:rgba(0,255,136,0.5);background:rgba(0,255,136,0.03);}
.tcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.7rem;}
.tcard-icon{font-size:1.6rem;}
.tlevel{font-size:0.6rem;font-family:'JetBrains Mono',monospace;padding:0.15rem 0.5rem;border-radius:4px;font-weight:700;text-transform:uppercase;}
.lv-beginner{background:rgba(0,255,136,0.12);color:var(--green);}
.lv-intermediate{background:rgba(68,136,255,0.12);color:var(--blue);}
.lv-advanced{background:rgba(255,136,68,0.12);color:var(--orange);}
.tcard-title{font-size:0.95rem;font-weight:700;margin-bottom:0.3rem;color:#fff;}
.tcard-desc{font-size:0.78rem;color:var(--muted);line-height:1.5;}
.tcard-footer{display:flex;justify-content:space-between;align-items:center;margin-top:0.9rem;}
.open-btn{font-size:0.72rem;padding:0.28rem 0.8rem;border-radius:6px;border:1px solid var(--green);background:rgba(0,255,136,0.08);color:var(--green);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;transition:all 0.2s;}
.open-btn:hover{background:var(--green);color:var(--bg);}
.tcard-dur{font-size:0.68rem;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.done-badge{font-size:0.68rem;color:var(--green);font-weight:700;}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.88);backdrop-filter:blur(8px);overflow-y:scroll;-webkit-overflow-scrolling:touch;}
.modal-overlay.open{display:block;animation:fadeIn 0.2s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:18px;max-width:760px;margin:1.5rem auto;padding:1.8rem;position:relative;}
.modal-close{position:absolute;top:1rem;right:1rem;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;padding:0.35rem 0.75rem;font-size:0.85rem;transition:all 0.2s;}
.modal-close:hover{color:#fff;border-color:#fff;}
.modal-header{margin-bottom:1.3rem;padding-right:3rem;}
.modal-icon{font-size:2.2rem;margin-bottom:0.4rem;}
.modal-title{font-size:1.4rem;font-weight:700;color:#fff;font-family:'JetBrains Mono',monospace;}
.modal-subtitle{color:var(--muted);font-size:0.8rem;margin-top:0.25rem;}
.chapter{margin-bottom:1.8rem;}
.ch-title{font-size:0.9rem;font-weight:700;color:var(--green);font-family:'JetBrains Mono',monospace;margin-bottom:0.7rem;display:flex;align-items:center;gap:0.4rem;}
.ch-title::before{content:'▶';font-size:0.55rem;}
.ch-text{font-size:0.85rem;line-height:1.75;color:var(--text);}
.ch-text strong{color:#fff;}
.code-block{background:#070714;border:1px solid var(--border);border-radius:10px;padding:1.1rem;margin:0.7rem 0;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:0.78rem;line-height:1.7;color:#a0c8ff;}
.kw{color:var(--pink);}
.fn{color:var(--yellow);}
.str{color:var(--green);}
.cm{color:#445;font-style:italic;}
.num{color:var(--orange);}
.concept-list{list-style:none;margin:0.4rem 0 0.8rem;}
.concept-list li{padding:0.55rem 0.75rem;margin-bottom:0.35rem;background:var(--card);border:1px solid var(--border);border-radius:7px;font-size:0.82rem;display:flex;gap:0.6rem;align-items:flex-start;}
.concept-list li::before{content:'→';color:var(--green);flex-shrink:0;font-family:'JetBrains Mono',monospace;}
.quiz-section{margin-top:1.3rem;}
.quiz-title{font-size:0.9rem;font-weight:700;color:var(--orange);margin-bottom:0.9rem;font-family:'JetBrains Mono',monospace;}
.quiz-q{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0.9rem;margin-bottom:0.9rem;}
.quiz-q-text{font-size:0.85rem;font-weight:600;color:#fff;margin-bottom:0.65rem;}
.quiz-options{display:flex;flex-direction:column;gap:0.35rem;}
.qopt{padding:0.5rem 0.85rem;border-radius:7px;border:1px solid var(--border);background:none;color:var(--text);cursor:pointer;text-align:left;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.8rem;transition:all 0.2s;}
.qopt:hover:not(:disabled){border-color:var(--blue);color:#fff;}
.qopt.correct{background:rgba(0,255,136,0.15);border-color:var(--green);color:var(--green);}
.qopt.wrong{background:rgba(255,68,68,0.1);border-color:#ff4444;color:#ff6666;}
.modal-footer{display:flex;justify-content:space-between;align-items:center;margin-top:1.8rem;padding-top:1.3rem;border-top:1px solid var(--border);}
.mark-done-btn{padding:0.65rem 1.6rem;border-radius:9px;border:none;background:var(--green);color:var(--bg);font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.88rem;transition:opacity 0.2s;}
.mark-done-btn:hover{opacity:0.85;}
.mark-done-btn.already{background:var(--card);border:1.5px solid var(--green);color:var(--green);}
.res-link{font-size:0.78rem;color:var(--blue);text-decoration:none;}
/* TECH */
.tech-page{padding:1.2rem;max-width:1000px;margin:0 auto;}
.page-title{font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:700;margin-bottom:1.3rem;}
.page-title span{color:var(--green);}
.tech-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:0.9rem;}
.tech-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:1rem;transition:all 0.2s;}
.tech-card:hover{border-color:var(--blue);transform:translateY(-2px);}
.tc-name{font-size:0.9rem;font-weight:700;color:#fff;}
.tc-hot{font-size:0.58rem;padding:0.12rem 0.45rem;border-radius:4px;background:rgba(255,204,0,0.12);color:var(--yellow);margin-left:0.35rem;}
.tc-cat{font-size:0.68rem;color:var(--muted);font-family:'JetBrains Mono',monospace;margin:0.25rem 0 0.65rem;}
.tc-bar{height:4px;background:var(--border);border-radius:999px;margin-bottom:0.4rem;}
.tc-fill{height:100%;border-radius:999px;transition:width 1s ease;}
.tc-pct{font-size:0.68rem;color:var(--muted);font-family:'JetBrains Mono',monospace;text-align:right;}
@media(max-width:600px){.modal{margin:0;border-radius:16px 16px 0 0;margin-top:5vh;min-height:95vh;}.modal-overlay.open{display:block;}.hero h1{font-size:1.5rem;}}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<nav>
  <div class="logo">CSE<span>.learn</span></div>
  <div class="nav-right">
    <span class="progress-chip prog-chip" id="prog-chip">0/24</span>
    <button class="nav-tab active" onclick="showPage('roadmap',this)">📚 Roadmap</button>
    <button class="nav-tab" onclick="showPage('tech',this)">⚡ Tech</button>
  </div>
</nav>
<main>
<div class="page active roadmap-page" id="page-roadmap">
  <div class="hero">
    <h1><span class="g">Beginner</span> to <span class="b">Pro</span><br>CSE Roadmap</h1>
    <p>📖 Kisi bhi topic pe tap karo — poora chapter, code aur quiz khulega!</p>
  </div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-num" id="s-done">0</div><div class="stat-lbl">Done</div></div>
    <div class="stat-box"><div class="stat-num" id="s-total">24</div><div class="stat-lbl">Topics</div></div>
    <div class="stat-box"><div class="stat-num" id="s-pct">0%</div><div class="stat-lbl">Progress</div></div>
  </div>
  <div class="prog-bar">
    <div class="prog-top"><span>Overall Progress</span><span id="prog-lbl">0 / 24</span></div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="level-tabs">
    <button class="ltab active" onclick="filterLevel('all',this)">All</button>
    <button class="ltab" onclick="filterLevel('beginner',this)">🟢 Beginner</button>
    <button class="ltab" onclick="filterLevel('intermediate',this)">🔵 Intermediate</button>
    <button class="ltab" onclick="filterLevel('advanced',this)">🟠 Advanced</button>
  </div>
  <div class="topics-grid" id="topics-grid"></div>
</div>
<div class="page tech-page" id="page-tech">
  <div class="page-title">⚡ Tech <span>Pulse</span> 2025</div>
  <div class="tech-grid" id="tech-grid"></div>
</div>
</main>
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕ Close</button>
    <div id="modal-content"></div>
  </div>
</div>
<script>
const topics=[{id:1,icon:'💡',title:'Programming Fundamentals',level:'beginner',dur:'4 weeks',desc:'Variables, loops, conditions — the building blocks of every program.',chapter:{intro:'Programming fundamentals are the <strong>foundation</strong> of everything in Computer Science. Before you write any app or website, you must understand how a computer thinks and executes instructions step by step.',concepts:['Variable — Ek box jo data store karta hai (number, text, true/false)','Data Types — int, float, string, boolean, list','Operators — +, -, *, /, %, ==, !=, &&, ||','Conditions — if, else, elif — code me decisions lena','Loops — for, while — kaam baar baar karna automatically','Functions — Reusable code block with a name','Input/Output — User se input lena, output dikhana'],code:`<span class="cm"># Python example — basics in action</span>\n<span class="kw">name</span> = <span class="str">"Digambar"</span>\n<span class="kw">age</span> = <span class="num">21</span>\n\n<span class="cm"># Condition</span>\n<span class="kw">if</span> age >= <span class="num">18</span>:\n    <span class="fn">print</span>(<span class="str">"Adult!"</span>)\n<span class="kw">else</span>:\n    <span class="fn">print</span>(<span class="str">"Minor"</span>)\n\n<span class="cm"># Loop</span>\n<span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(<span class="num">5</span>):\n    <span class="fn">print</span>(<span class="str">f"Number: {i}"</span>)\n\n<span class="cm"># Function</span>\n<span class="kw">def</span> <span class="fn">greet</span>(name):\n    <span class="kw">return</span> <span class="str">f"Hello, {name}!"</span>\n\n<span class="fn">print</span>(<span class="fn">greet</span>(<span class="str">"Bhai"</span>))`,quiz:[{q:'Variable ka kya kaam hai?',opts:['Code run karna','Data store karna','Loop banana','File open karna'],ans:1},{q:'Loop ka use kab karte hain?',opts:['Ek baar print karne ke liye','Same kaam baar baar karne ke liye','Function banana','Variable declare karna'],ans:1},{q:'if-else kya karta hai?',opts:['Loop chalata hai','Code me decision leta hai','Variable banata hai','Code delete karta hai'],ans:1}]}},{id:2,icon:'🐍',title:'Python Basics',level:'beginner',dur:'3 weeks',desc:'Most beginner-friendly language. Start here for scripting and AI.',chapter:{intro:'Python is the <strong>most popular beginner language</strong> in the world. It reads almost like English. Web development, data science, AI, automation — sab kuch Python se hota hai!',concepts:['Lists — Ordered collection: [1, 2, 3, "hello"]','Dictionaries — Key-value pairs: {"name": "Raj", "age": 20}','Tuples — Immutable lists: (1, 2, 3)','String methods — .upper(), .split(), .replace(), .strip()','File handling — open(), read(), write(), close()','Modules — import math, import random, import os','List comprehension — [x*2 for x in range(10)]'],code:`<span class="cm"># Python practical examples</span>\n\n<span class="cm"># Lists</span>\n<span class="kw">fruits</span> = [<span class="str">"apple"</span>, <span class="str">"mango"</span>, <span class="str">"banana"</span>]\n<span class="kw">fruits</span>.<span class="fn">append</span>(<span class="str">"grape"</span>)\n<span class="fn">print</span>(<span class="kw">fruits</span>[<span class="num">0</span>])  <span class="cm"># apple</span>\n\n<span class="cm"># Dictionary</span>\n<span class="kw">student</span> = {<span class="str">"name"</span>: <span class="str">"Digambar"</span>, <span class="str">"year"</span>: <span class="num">3</span>}\n<span class="fn">print</span>(<span class="kw">student</span>[<span class="str">"name"</span>])\n\n<span class="cm"># List comprehension</span>\n<span class="kw">squares</span> = [x**<span class="num">2</span> <span class="kw">for</span> x <span class="kw">in</span> <span class="fn">range</span>(<span class="num">10</span>)]\n<span class="fn">print</span>(<span class="kw">squares</span>)`,quiz:[{q:'Python me list kaise banate hain?',opts:['list = (1,2,3)','list = {1,2,3}','list = [1,2,3]','list = <1,2,3>'],ans:2},{q:'Dictionary me data kaise store hota hai?',opts:['Index se','Key-Value pair se','Loop se','Random se'],ans:1},{q:'import kab use karte hain?',opts:['Loop ke liye','Bahari module use karne ke liye','Variable banane ke liye','Print karne ke liye'],ans:1}]}},{id:3,icon:'🌐',title:'HTML & CSS',level:'beginner',dur:'2 weeks',desc:'Build your first web pages. Structure with HTML, style with CSS.',chapter:{intro:'HTML aur CSS web development ki <strong>pehli seedhi</strong> hain. HTML page ka structure banata hai, CSS usse sundar banata hai. Har website HTML aur CSS se bani hoti hai!',concepts:['HTML tags — h1, p, div, img, a, button, form','HTML structure — html > head > body','CSS selectors — element, .class, #id','Box model — margin, padding, border, content','Flexbox — display:flex for layouts','Colors — hex (#ff0000), rgb(), named colors','Responsive design — @media queries for mobile'],code:`<span class="cm">&lt;!-- HTML + CSS example --&gt;</span>\n<span class="kw">&lt;!DOCTYPE html&gt;</span>\n<span class="kw">&lt;html&gt;&lt;head&gt;</span>\n  <span class="kw">&lt;style&gt;</span>\n    <span class="fn">.card</span> {\n      <span class="kw">background</span>: <span class="str">#1a1a2e</span>;\n      <span class="kw">padding</span>: <span class="num">20px</span>;\n      <span class="kw">border-radius</span>: <span class="num">12px</span>;\n      <span class="kw">color</span>: <span class="str">white</span>;\n      <span class="kw">display</span>: <span class="str">flex</span>;\n      <span class="kw">gap</span>: <span class="num">10px</span>;\n    }\n    <span class="fn">h1</span> { <span class="kw">color</span>: <span class="str">#00ff88</span>; }\n  <span class="kw">&lt;/style&gt;</span>\n<span class="kw">&lt;/head&gt;&lt;body&gt;</span>\n  <span class="kw">&lt;div</span> class=<span class="str">"card"</span><span class="kw">&gt;</span>\n    <span class="kw">&lt;h1&gt;</span>Hello World! 🎉<span class="kw">&lt;/h1&gt;</span>\n    <span class="kw">&lt;button&gt;</span>Click Me<span class="kw">&lt;/button&gt;</span>\n  <span class="kw">&lt;/div&gt;</span>\n<span class="kw">&lt;/body&gt;&lt;/html&gt;</span>`,quiz:[{q:'HTML me heading kaise likhte hain?',opts:['<heading>','<h1>','<title>','<head>'],ans:1},{q:'CSS me class selector?',opts:['#classname','.classname','@classname','*classname'],ans:1},{q:'Flexbox kab use karte hain?',opts:['Color change ke liye','Layout banane ke liye','Font size ke liye','Image add ke liye'],ans:1}]}},{id:4,icon:'⚡',title:'JavaScript Basics',level:'beginner',dur:'4 weeks',desc:'Make web pages interactive. Core of all modern web development.',chapter:{intro:'JavaScript web ka <strong>ek maatra programming language</strong> hai jo browser me directly chalti hai. Isse web pages interactive bante hain — buttons, animations, forms, games — sab JS se!',concepts:['DOM manipulation — document.getElementById(), querySelector()','Events — onclick, onchange, addEventListener()','Arrow functions — const fn = () => {}','Promises & async/await — asynchronous operations','fetch() — Internet se data lana','localStorage — Browser me data save karna','ES6+ — let, const, template literals, destructuring'],code:`<span class="cm">// JavaScript — interactive web</span>\n\n<span class="cm">// DOM manipulation</span>\n<span class="kw">const</span> btn = document.<span class="fn">querySelector</span>(<span class="str">"#myBtn"</span>);\nbtn.<span class="fn">addEventListener</span>(<span class="str">"click"</span>, () => {\n  document.<span class="fn">querySelector</span>(<span class="str">"#msg"</span>).textContent\n    = <span class="str">"Clicked! 🎉"</span>;\n});\n\n<span class="cm">// Fetch API</span>\n<span class="kw">async function</span> <span class="fn">getData</span>() {\n  <span class="kw">const</span> res = <span class="kw">await</span> <span class="fn">fetch</span>(<span class="str">"https://api.github.com/users/torvalds"</span>);\n  <span class="kw">const</span> data = <span class="kw">await</span> res.<span class="fn">json</span>();\n  <span class="fn">console</span>.<span class="fn">log</span>(data.name);\n}\n\n<span class="cm">// localStorage</span>\nlocalStorage.<span class="fn">setItem</span>(<span class="str">"user"</span>, <span class="str">"Digambar"</span>);\n<span class="kw">const</span> user = localStorage.<span class="fn">getItem</span>(<span class="str">"user"</span>);`,quiz:[{q:'JavaScript kahan run hota hai?',opts:['Server pe','Database me','Browser me','OS me'],ans:2},{q:'DOM kya hai?',opts:['Database','HTML ka object representation','CSS framework','JS library'],ans:1},{q:'async/await kab use karte hain?',opts:['Loop ke liye','Asynchronous operations ke liye','CSS ke liye','HTML ke liye'],ans:1}]}},{id:5,icon:'🗄️',title:'Databases & SQL',level:'beginner',dur:'3 weeks',desc:'Store and query data with SQL. Essential for any backend.',chapter:{intro:'Database ek <strong>organized data store</strong> hai. SQL se hum database me data save, retrieve, update aur delete karte hain. Har app ka data kisi na kisi database me hota hai!',concepts:['Table — Data rows aur columns me store hoti hai','SELECT — Data retrieve karna','INSERT — Naya data add karna','UPDATE — Existing data change karna','DELETE — Data remove karna','WHERE — Condition lagana filter ke liye','JOIN — Multiple tables ko combine karna'],code:`<span class="cm">-- SQL basics</span>\n\n<span class="cm">-- Table banana</span>\n<span class="kw">CREATE TABLE</span> students (\n  id <span class="kw">INT PRIMARY KEY</span>,\n  name <span class="kw">VARCHAR</span>(<span class="num">100</span>),\n  year <span class="kw">INT</span>\n);\n\n<span class="cm">-- Data insert</span>\n<span class="kw">INSERT INTO</span> students\n<span class="kw">VALUES</span> (<span class="num">1</span>, <span class="str">'Digambar'</span>, <span class="num">3</span>);\n\n<span class="cm">-- Data fetch</span>\n<span class="kw">SELECT</span> * <span class="kw">FROM</span> students;\n<span class="kw">SELECT</span> name <span class="kw">FROM</span> students\n  <span class="kw">WHERE</span> year = <span class="num">3</span>;\n\n<span class="cm">-- Data update</span>\n<span class="kw">UPDATE</span> students\n<span class="kw">SET</span> year = <span class="num">4</span>\n<span class="kw">WHERE</span> name = <span class="str">'Digambar'</span>;`,quiz:[{q:'Database me data retrieve karne ke liye?',opts:['INSERT','UPDATE','SELECT','DELETE'],ans:2},{q:'WHERE clause kab use karte hain?',opts:['Table banane ke liye','Condition filter ke liye','Data insert ke liye','Table delete ke liye'],ans:1},{q:'PRIMARY KEY kya hota hai?',opts:['Password','Unique identifier har row ka','Column ka naam','Table ka naam'],ans:1}]}},{id:6,icon:'🔢',title:'Data Structures',level:'intermediate',dur:'8 weeks',desc:'Arrays, linked lists, stacks, queues, trees — master DSA.',chapter:{intro:'Data Structures batati hain ki <strong>data ko memory me kaise organize karein</strong>. Sahi data structure chunne se program fast aur efficient banta hai. Ye interviews ka sabse important topic hai!',concepts:['Array — Fixed size, index se O(1) access','Linked List — Dynamic size, nodes connected by pointers','Stack — LIFO (Last In First Out) — push/pop','Queue — FIFO (First In First Out) — enqueue/dequeue','Tree — Hierarchical structure, root-parent-child','Binary Search Tree — Left < Root < Right always','Hash Map — Key-value, average O(1) lookup'],code:`<span class="cm"># Python DSA examples</span>\n\n<span class="cm"># Stack</span>\n<span class="kw">stack</span> = []\n<span class="kw">stack</span>.<span class="fn">append</span>(<span class="num">1</span>)  <span class="cm"># push</span>\n<span class="kw">stack</span>.<span class="fn">append</span>(<span class="num">2</span>)\n<span class="kw">stack</span>.<span class="fn">pop</span>()     <span class="cm"># pop → 2</span>\n\n<span class="cm"># Queue</span>\n<span class="kw">from</span> collections <span class="kw">import</span> deque\n<span class="kw">q</span> = <span class="fn">deque</span>()\n<span class="kw">q</span>.<span class="fn">append</span>(<span class="num">1</span>)\n<span class="kw">q</span>.<span class="fn">popleft</span>()  <span class="cm"># → 1</span>\n\n<span class="cm"># Hash Map</span>\n<span class="kw">freq</span> = {}\n<span class="kw">for</span> ch <span class="kw">in</span> <span class="str">"hello"</span>:\n    <span class="kw">freq</span>[ch] = <span class="kw">freq</span>.<span class="fn">get</span>(ch, <span class="num">0</span>) + <span class="num">1</span>\n<span class="fn">print</span>(<span class="kw">freq</span>)`,quiz:[{q:'Stack ka principle kya hai?',opts:['FIFO','LIFO','Random','Sorted'],ans:1},{q:'Hash Map me lookup ki time complexity?',opts:['O(n)','O(log n)','O(1) average','O(n²)'],ans:2},{q:'BST me left child hota hai?',opts:['Root se bada','Root se chota','Root ke barabar','Random'],ans:1}]}},{id:7,icon:'🧠',title:'Algorithms',level:'intermediate',dur:'8 weeks',desc:'Sorting, searching, DP — learn to think like an engineer.',chapter:{intro:'Algorithms are <strong>step-by-step solutions</strong> to problems. Time complexity (Big O) se hum algorithm ki speed measure karte hain. Interviews me sab se jyada ye hi puchha jaata hai!',concepts:['Big O — O(1), O(log n), O(n), O(n log n), O(n²)','Binary Search — O(log n), sorted array me search','Bubble Sort — O(n²), simple but slow','Merge Sort — O(n log n), divide and conquer','Recursion — Function jo khud ko call kare','Dynamic Programming — Subproblems ko cache karo','Two Pointer & Sliding Window — Array tricks'],code:`<span class="cm"># Binary Search — O(log n)</span>\n<span class="kw">def</span> <span class="fn">binary_search</span>(arr, target):\n    left, right = <span class="num">0</span>, <span class="fn">len</span>(arr) - <span class="num">1</span>\n    <span class="kw">while</span> left <= right:\n        mid = (left + right) // <span class="num">2</span>\n        <span class="kw">if</span> arr[mid] == target: <span class="kw">return</span> mid\n        <span class="kw">elif</span> arr[mid] < target: left = mid + <span class="num">1</span>\n        <span class="kw">else</span>: right = mid - <span class="num">1</span>\n    <span class="kw">return</span> -<span class="num">1</span>\n\n<span class="cm"># DP — Fibonacci</span>\n<span class="kw">def</span> <span class="fn">fib</span>(n, memo={}):\n    <span class="kw">if</span> n <= <span class="num">1</span>: <span class="kw">return</span> n\n    <span class="kw">if</span> n <span class="kw">not in</span> memo:\n        memo[n] = <span class="fn">fib</span>(n-<span class="num">1</span>) + <span class="fn">fib</span>(n-<span class="num">2</span>)\n    <span class="kw">return</span> memo[n]`,quiz:[{q:'Binary search ki time complexity?',opts:['O(n)','O(log n)','O(n²)','O(1)'],ans:1},{q:'DP kab use karte hain?',opts:['Sorting ke liye','Overlapping subproblems ke liye','File read ke liye','UI ke liye'],ans:1},{q:'Recursion kya hai?',opts:['Loop ka type','Function jo khud ko call kare','Sorting algorithm','Data structure'],ans:1}]}},{id:8,icon:'🐙',title:'Git & GitHub',level:'beginner',dur:'1 week',desc:'Version control — tu already use kar raha hai! 😄',chapter:{intro:'Git ek <strong>version control system</strong> hai. GitHub Git ka online platform hai. Tu already GitHub use kar raha hai — ab Git commands seekh! Ye skill job me roz kaam aati hai.',concepts:['git init — Naya repository banana','git add — Changes staging area me add karna','git commit — Changes save karna with message','git push — Code GitHub pe upload karna','git pull — Latest code download karna','git branch — Alag feature ke liye alag branch','git merge — Branch ko main me milana'],code:`<span class="cm"># Git daily commands</span>\n\n<span class="cm"># First time setup</span>\ngit config --global user.name <span class="str">"Digambar"</span>\ngit config --global user.email <span class="str">"email@gmail.com"</span>\n\n<span class="cm"># Daily workflow</span>\ngit status           <span class="cm"># kya change hua?</span>\ngit add .            <span class="cm"># sab stage karo</span>\ngit commit -m <span class="str">"feat: add login page"</span>\ngit push origin main\n\n<span class="cm"># Kisi ka code download karo</span>\ngit clone https://github.com/user/repo\n\n<span class="cm"># Naya branch banana</span>\ngit checkout -b feature/new-feature`,quiz:[{q:'git commit kya karta hai?',opts:['Code delete karta hai','Changes save karta hai','Code upload karta hai','Branch banata hai'],ans:1},{q:'git push kab use karte hain?',opts:['Local changes save ke liye','GitHub pe upload ke liye','Branch banane ke liye','Code download ke liye'],ans:1},{q:'git clone kya karta hai?',opts:['Code delete karta hai','GitHub se code download karta hai','Branch merge karta hai','Commit karta hai'],ans:1}]}},{id:9,icon:'⚛️',title:'React.js',level:'intermediate',dur:'6 weeks',desc:'Build modern UIs with the world\'s most popular frontend library.',chapter:{intro:'React ek JavaScript library hai jo <strong>UI components</strong> banane ke liye use hoti hai. Netflix, Instagram, Facebook sab React use karte hain. 2025 me sabse in-demand frontend skill!',concepts:['Component — Reusable UI piece (function)','JSX — HTML + JavaScript mixed syntax','Props — Parent se child ko data pass karna','State (useState) — Component ka internal data','useEffect — Side effects handle karna','Virtual DOM — Fast UI updates automatically','React Router — Multi-page navigation'],code:`<span class="cm">// React component</span>\n<span class="kw">import</span> { useState } <span class="kw">from</span> <span class="str">'react'</span>;\n\n<span class="kw">function</span> <span class="fn">Counter</span>() {\n  <span class="kw">const</span> [count, setCount] = <span class="fn">useState</span>(<span class="num">0</span>);\n\n  <span class="kw">return</span> (\n    &lt;div&gt;\n      &lt;h1&gt;Count: {count}&lt;/h1&gt;\n      &lt;button onClick={() =&gt; <span class="fn">setCount</span>(count + <span class="num">1</span>)}&gt;\n        +1\n      &lt;/button&gt;\n      &lt;button onClick={() =&gt; <span class="fn">setCount</span>(<span class="num">0</span>)}&gt;\n        Reset\n      &lt;/button&gt;\n    &lt;/div&gt;\n  );\n}\n\n<span class="kw">export default</span> Counter;`,quiz:[{q:'useState kya return karta hai?',opts:['Sirf value','Value aur setter function','Component','HTML'],ans:1},{q:'Props kya hain?',opts:['Internal state','Parent se child ko data','Database','CSS styles'],ans:1},{q:'JSX kya hai?',opts:['New language','HTML + JS mixed syntax','Database query','CSS preprocessor'],ans:1}]}},{id:10,icon:'🖥️',title:'Node.js & Express',level:'intermediate',dur:'5 weeks',desc:'Backend with JS. Build REST APIs and web servers.',chapter:{intro:'Node.js se <strong>JavaScript server pe chalti hai</strong>. Express.js se REST APIs banana easy hota hai. Ye combination duniya ka most popular backend stack hai!',concepts:['Node.js — JavaScript runtime outside browser','npm — Package manager, 1M+ libraries available','Express.js — Web framework for Node','REST API — GET, POST, PUT, DELETE routes','Middleware — Request-response ke beech code','JSON — Standard data exchange format','.env — Environment variables, secrets store karna'],code:`<span class="cm">// Express.js REST API</span>\n<span class="kw">const</span> express = <span class="fn">require</span>(<span class="str">'express'</span>);\n<span class="kw">const</span> app = <span class="fn">express</span>();\napp.<span class="fn">use</span>(express.<span class="fn">json</span>());\n\n<span class="kw">let</span> students = [\n  { id: <span class="num">1</span>, name: <span class="str">"Digambar"</span>, year: <span class="num">3</span> }\n];\n\n<span class="cm">// GET all</span>\napp.<span class="fn">get</span>(<span class="str">'/students'</span>, (req, res) =&gt; {\n  res.<span class="fn">json</span>(students);\n});\n\n<span class="cm">// POST — add new</span>\napp.<span class="fn">post</span>(<span class="str">'/students'</span>, (req, res) =&gt; {\n  students.<span class="fn">push</span>(req.body);\n  res.<span class="fn">json</span>({ message: <span class="str">"Added!"</span> });\n});\n\napp.<span class="fn">listen</span>(<span class="num">3000</span>);`,quiz:[{q:'Node.js kya allow karta hai?',opts:['JS browser me chalana','JS server pe chalana','CSS likhna','Database banana'],ans:1},{q:'REST API me data delete karne ke liye?',opts:['GET','POST','PUT','DELETE'],ans:3},{q:'npm kya hai?',opts:['Node ka version','Package manager','Database','Framework'],ans:1}]}},{id:11,icon:'🐳',title:'Docker',level:'intermediate',dur:'3 weeks',desc:'Containerization — works on any machine!',chapter:{intro:'Docker ek containerization tool hai. <strong>"Works on my machine" problem khatam!</strong> Ek container banao, kahin bhi chalao — development, testing, production sab same environment.',concepts:['Image — App ka blueprint/snapshot','Container — Running instance of image','Dockerfile — Image banane ki recipe','docker run — Container start karna','docker-compose — Multiple containers manage karna','Volumes — Data persist karna between restarts','Port mapping — Container port expose karna'],code:`<span class="cm"># Dockerfile</span>\n<span class="kw">FROM</span> node:<span class="num">18</span>\n<span class="kw">WORKDIR</span> /app\n<span class="kw">COPY</span> package*.json ./\n<span class="kw">RUN</span> npm install\n<span class="kw">COPY</span> . .\n<span class="kw">EXPOSE</span> <span class="num">3000</span>\n<span class="kw">CMD</span> [<span class="str">"node"</span>, <span class="str">"index.js"</span>]\n\n<span class="cm"># Build and run</span>\ndocker build -t myapp .\ndocker run -p <span class="num">3000</span>:<span class="num">3000</span> myapp\n\n<span class="cm"># docker-compose.yml</span>\nversion: <span class="str">'3'</span>\nservices:\n  app:\n    build: .\n    ports: [<span class="str">"3000:3000"</span>]`,quiz:[{q:'Container kya hai?',opts:['Virtual machine','Running app instance','Database','CSS framework'],ans:1},{q:'Dockerfile kya define karta hai?',opts:['CSS styles','Image banane ki steps','Database schema','API routes'],ans:1}]}},{id:12,icon:'☁️',title:'Cloud Basics (AWS)',level:'intermediate',dur:'6 weeks',desc:'Deploy apps on AWS. EC2, S3, serverless.',chapter:{intro:'Cloud computing matlab <strong>internet pe computers rent karna</strong>. AWS world ka #1 cloud provider hai. Aaj har company cloud use karti hai — ye skill bahut valuable hai!',concepts:['EC2 — Virtual server (computer rent karo)','S3 — File/image storage bucket (cheap & scalable)','RDS — Managed database service','Lambda — Serverless functions (pay per use)','IAM — Users aur permissions manage karna','CloudFront — CDN for fast global content delivery','Load Balancer — Traffic multiple servers me distribute karna'],code:`<span class="cm"># AWS CLI commands</span>\n\n<span class="cm"># S3 bucket banana</span>\naws s3 mb s3://my-app-bucket\n\n<span class="cm"># File upload karna</span>\naws s3 cp index.html s3://my-app-bucket/\n\n<span class="cm"># Static website hosting enable</span>\naws s3 website s3://my-app-bucket \\\n  --index-document index.html\n\n<span class="cm"># Lambda function deploy</span>\naws lambda create-function \\\n  --function-name myFunc \\\n  --runtime nodejs18.x \\\n  --handler index.handler`,quiz:[{q:'EC2 kya provide karta hai?',opts:['Database','Virtual server','File storage','CDN'],ans:1},{q:'S3 kab use karte hain?',opts:['Code run ke liye','Files/images store ke liye','Database ke liye','Load balancing ke liye'],ans:1}]}},{id:13,icon:'🏗️',title:'System Design',level:'advanced',dur:'10 weeks',desc:'Design scalable systems like Netflix or Twitter.',chapter:{intro:'System Design me hum <strong>large scale systems architect</strong> karte hain. FAANG interviews ka sabse important topic. Kaise design karein system jo crores users handle kare?',concepts:['Load Balancer — Traffic multiple servers me distribute karna','Caching (Redis) — Frequently used data fast access ke liye','Database Sharding — Data multiple DBs me split karna','Microservices — App ko chhoti independent services me todna','Message Queue (Kafka) — Async communication between services','CDN — Content users ke paas se serve karna','Rate Limiting — API abuse aur DDoS rokna'],code:`<span class="cm"># Twitter jaisa system design</span>\n\nClient\n  ↓\nCDN (images, static files)\n  ↓\nLoad Balancer\n  ↓\nAPI Servers (10 instances)\n  ↓        ↓\nCache    Database\n(Redis)  (PostgreSQL)\n  ↓\nMessage Queue (Kafka)\n  ↓\nNotification Service\n\n<span class="cm"># Key decisions:</span>\n<span class="cm"># Read heavy → Cache aggressively</span>\n<span class="cm"># Write heavy → Message queues</span>\n<span class="cm"># Global users → CDN + multi-region</span>`,quiz:[{q:'Load Balancer ka kaam?',opts:['Data store karna','Traffic distribute karna','Cache manage karna','Code run karna'],ans:1},{q:'Redis kab use karte hain?',opts:['Primary database ke liye','Fast caching ke liye','File storage ke liye','Load balancing ke liye'],ans:1}]}},{id:14,icon:'🤖',title:'Machine Learning',level:'advanced',dur:'8 weeks',desc:'Neural networks, model training — start your AI journey.',chapter:{intro:'Machine Learning matlab <strong>computers ko data se seekhna sikhana</strong>. Explicit programming ke bina computer patterns find karta hai. AI ka core yahi hai!',concepts:['Supervised Learning — Labeled data se seekhna','Unsupervised Learning — Patterns khud dhundhna','Linear Regression — Continuous values predict karna','Classification — Category predict karna (spam/not spam)','Neural Networks — Brain inspired learning model','Training/Testing Split — 80/20 rule, overfitting rokna','scikit-learn — Python ki best ML library'],code:`<span class="cm"># scikit-learn ML example</span>\n<span class="kw">from</span> sklearn.linear_model <span class="kw">import</span> LinearRegression\n<span class="kw">from</span> sklearn.model_selection <span class="kw">import</span> train_test_split\n<span class="kw">import</span> numpy <span class="kw">as</span> np\n\nX = np.<span class="fn">array</span>([[<span class="num">1</span>],[<span class="num">2</span>],[<span class="num">3</span>],[<span class="num">4</span>],[<span class="num">5</span>]])\ny = np.<span class="fn">array</span>([<span class="num">2</span>,<span class="num">4</span>,<span class="num">6</span>,<span class="num">8</span>,<span class="num">10</span>])\n\nX_train, X_test, y_train, y_test = <span class="fn">train_test_split</span>(\n    X, y, test_size=<span class="num">0.2</span>)\n\nmodel = <span class="fn">LinearRegression</span>()\nmodel.<span class="fn">fit</span>(X_train, y_train)\n<span class="fn">print</span>(model.<span class="fn">predict</span>([[<span class="num">6</span>]]))  <span class="cm"># → [12]</span>`,quiz:[{q:'Supervised learning me kya chahiye?',opts:['Unlabeled data','Labeled data','No data','Only images'],ans:1},{q:'Overfitting kab hota hai?',opts:['Model underfit ho','Train data memorize kar le','Model fast ho','Model slow ho'],ans:1}]}},{id:15,icon:'🔐',title:'Cybersecurity',level:'intermediate',dur:'4 weeks',desc:'OWASP, SQL injection, encryption — build secure apps.',chapter:{intro:'Security <strong>har developer ki responsibility</strong> hai. Ek bhi vulnerability se crores ka data leak ho sakta hai. OWASP Top 10 security risks hain jo sabse common hain!',concepts:['SQL Injection — Malicious SQL input se DB attack','XSS — Cross-site scripting, malicious JS inject karna','HTTPS/TLS — Encrypted communication','Hashing — Passwords hash karo (bcrypt, not MD5)','Authentication vs Authorization — Who vs What can do','OWASP Top 10 — Must know security vulnerabilities','Rate Limiting — Brute force attacks rokna'],code:`<span class="cm"># Security examples</span>\n\n<span class="cm"># BAD — SQL injection vulnerable!</span>\nquery = <span class="str">f"SELECT * FROM users WHERE name='{user_input}'"</span>\n\n<span class="cm"># GOOD — Parameterized query</span>\nquery = <span class="str">"SELECT * FROM users WHERE name=?"</span>\ncursor.<span class="fn">execute</span>(query, (user_input,))\n\n<span class="cm"># Password hashing</span>\n<span class="kw">import</span> bcrypt\npassword = <span class="str">b"mypassword"</span>\nhashed = bcrypt.<span class="fn">hashpw</span>(password, bcrypt.<span class="fn">gensalt</span>())\n\n<span class="cm"># Verify</span>\nbcrypt.<span class="fn">checkpw</span>(password, hashed)  <span class="cm"># True</span>`,quiz:[{q:'SQL injection kya hai?',opts:['SQL optimize karna','Malicious SQL se DB attack','Database backup','Query speed'],ans:1},{q:'Password hashing kyon?',opts:['Speed ke liye','Plain text safe nahi hota','Database size ke liye','Login speed ke liye'],ans:1}]}},{id:16,icon:'📱',title:'React Native / Flutter',level:'intermediate',dur:'6 weeks',desc:'Build cross-platform mobile apps with one codebase.',chapter:{intro:'React Native aur Flutter se <strong>ek hi code se Android aur iOS app</strong> banta hai! Alag alag apps banane ki zarurat nahi. Time aur money dono bachte hain!',concepts:['React Native — JS se native mobile apps (by Facebook)','Flutter — Dart language, by Google','Components — View, Text, Image, TouchableOpacity','StyleSheet — CSS jaisi mobile styling','Navigation — React Navigation library','Device APIs — Camera, GPS, Push Notifications','Build — APK (Android), IPA (iOS) generate karna'],code:`<span class="cm">// React Native example</span>\n<span class="kw">import</span> { View, Text, TouchableOpacity, StyleSheet } <span class="kw">from</span> <span class="str">'react-native'</span>;\n<span class="kw">import</span> { useState } <span class="kw">from</span> <span class="str">'react'</span>;\n\n<span class="kw">export default function</span> <span class="fn">App</span>() {\n  <span class="kw">const</span> [count, setCount] = <span class="fn">useState</span>(<span class="num">0</span>);\n  <span class="kw">return</span> n> jwt = <span class="fn">require</span>(<span class="str">'jsonwebtoken'</span>);\n\n<span class="kw">const</span> token = jwt.<span class="fn">sign</span>(\n  { userId: <span class="num">1</span> },\n  process.env.JWT_SECRET,\n  { expiresIn: <span class="str">'24h'</span> }\n);\n\n<span class="kw">const</span> decoded = jwt.<span class="fn">verify</span>(token, process.env.JWT_SECRET);`,quiz:[{q:'REST me data create karne ke liye?',opts:['GET','POST','PUT','DELETE'],ans:1},{q:'JWT kab use karte hain?',opts:['Database queries ke liye','User authentication ke liye','File upload ke liye','CSS ke liye'],ans:1}]}},{id:18,icon:'🧪',title:'Testing & TDD',level:'intermediate',dur:'3 weeks',desc:'Unit testing, TDD — write code you can trust.',chapter:{intro:'Testing ensure karta hai ki tumhara code <strong>expected behavior kare</strong>. TDD me pehle test likhte hain, phir code! Production bugs se bachne ka sabse achha tarika.',concepts:['Unit Test — Single function ya component test karna','Integration Test — Multiple parts together test karna','E2E Test — Full user journey test karna','Jest — JavaScript ka #1 testing framework','pytest — Python testing framework','Mocking — Fake dependencies banana tests ke liye','Code Coverage — Kitna % code test hua hai'],code:`<span class="cm">// Jest unit tests</span>\n\n<span class="kw">function</span> <span class="fn">add</span>(a, b) { <span class="kw">return</span> a + b; }\n\n<span class="fn">describe</span>(<span class="str">'add function'</span>, () =&gt; {\n  <span class="fn">test</span>(<span class="str">'adds two numbers'</span>, () =&gt; {\n    <span class="fn">expect</span>(<span class="fn">add</span>(<span class="num">2</span>, <span class="num">3</span>)).<span class="fn">toBe</span>(<span class="num">5</span>);\n  });\n\n  <span class="fn">test</span>(<span class="str">'handles negatives'</span>, () =&gt; {\n    <span class="fn">expect</span>(<span class="fn">add</span>(-<span class="num">1</span>, <span class="num">1</span>)).<span class="fn">toBe</span>(<span class="num">0</span>);\n  });\n\n  <span class="fn">test</span>(<span class="str">'handles zeros'</span>, () =&gt; {\n    <span class="fn">expect</span>(<span class="fn">add</span>(<span class="num">0</span>, <span class="num">0</span>)).<span class="fn">toBe</span>(<span class="num">0</span>);\n  });\n});`,quiz:[{q:'TDD me kya pehle likhte hain?',opts:['Code','Database','Test','Documentation'],ans:2},{q:'Unit test kya test karta hai?',opts:['Poora app','Single function/component','Database','Network'],ans:1}]}},{id:19,icon:'🧬',title:'Generative AI & LLMs',level:'advanced',dur:'8 weeks',desc:'GPT, Claude, LangChain — build AI-powered products.',chapter:{intro:'Generative AI ek <strong>revolution hai</strong>! LLMs jaise GPT-4, Claude text generate, code likhte hain. 2025 me ye skill sabse zyada in-demand hai. Iss wave ko miss mat karo!',concepts:['LLM — Large Language Model (GPT, Claude, Gemini)','Prompt Engineering — Sahi output ke liye sahi instruction','API Integration — OpenAI/Anthropic API apne app me use karna','LangChain — LLM apps banane ka popular framework','RAG — Custom data LLM me add karna','Embeddings — Text ko vector me convert karna','Fine-tuning — Model ko specific task ke liye train karna'],code:`<span class="cm"># Anthropic Claude API</span>\n<span class="kw">import</span> anthropic\n\nclient = anthropic.<span class="fn">Anthropic</span>()\n\nmessage = client.messages.<span class="fn">create</span>(\n    model=<span class="str">"claude-opus-4-6"</span>,\n    max_tokens=<span class="num">1024</span>,\n    messages=[{\n      <span class="str">"role"</span>: <span class="str">"user"</span>,\n      <span class="str">"content"</span>: <span class="str">"DSA roadmap for beginners"</span>\n    }]\n)\n\n<span class="fn">print</span>(message.content[<span class="num">0</span>].text)\n\n<span class="cm"># Prompt engineering tips:</span>\n<span class="cm"># - Be specific and detailed</span>\n<span class="cm"># - Give examples of desired output</span>\n<span class="cm"># - Assign a role: "You are a..."</span>`,quiz:[{q:'Prompt Engineering kya hai?',opts:['Code likhna','LLM ko sahi output ke liye instruct karna','Database design','UI banana'],ans:1},{q:'RAG kab use karte hain?',opts:['Speed badhane ke liye','Custom data LLM me add karne ke liye','Database backup ke liye','CSS ke liye'],ans:1}]}},{id:20,icon:'⚙️',title:'DevOps & CI/CD',level:'advanced',dur:'8 weeks',desc:'GitHub Actions, Kubernetes — automate your delivery.',chapter:{intro:'DevOps development aur operations ko <strong>merge karta hai</strong>. CI/CD se code automatically test aur deploy hota hai. Manual deployment khatam — har push pe automatic deploy!',concepts:['CI — Code push hote hi automatically test hona','CD — Tests pass hone pe automatically deploy hona','GitHub Actions — Free CI/CD GitHub repos ke liye','Kubernetes (K8s) — Container orchestration at scale','Monitoring — Logs, metrics, alerts (Datadog, Grafana)','Infrastructure as Code — Terraform, CloudFormation','Blue/Green Deployment — Zero downtime releases'],code:`<span class="cm"># .github/workflows/deploy.yml</span>\n\nname: Deploy App\n<span class="kw">on</span>:\n  push:\n    branches: [main]\n\n<span class="kw">jobs</span>:\n  deploy:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v3\n\n      - name: Install\n        run: npm install\n\n      - name: Test\n        run: npm test\n\n      - name: Deploy\n        run: |\n          aws s3 sync ./build s3://my-app\n          echo "Deployed! 🚀"`,quiz:[{q:'CI kya karta hai?',opts:['Manual deploy karna','Code push pe auto test karna','Database backup','UI banana'],ans:1},{q:'K8s kab use karte hain?',opts:['Single server app ke liye','Multiple containers orchestrate ke liye','Database ke liye','Frontend ke liye'],ans:1}]}},{id:21,icon:'📊',title:'Data Science',level:'advanced',dur:'6 weeks',desc:'Pandas, NumPy — analyze real datasets and extract insights.',chapter:{intro:'Data Science me hum <strong>real data se insights nikaalte hain</strong>. Python ki libraries se millions of rows ka data seconds me analyze ho jaata hai. Har company data-driven decisions leti hai!',concepts:['NumPy — Fast numerical computing, arrays','Pandas — Data manipulation, DataFrames','Matplotlib — Charts aur graphs banana','Seaborn — Statistical visualizations','Data Cleaning — Missing values, duplicates handle karna','EDA — Exploratory Data Analysis','Jupyter Notebook — Interactive coding environment'],code:`<span class="cm"># Pandas data analysis</span>\n<span class="kw">import</span> pandas <span class="kw">as</span> pd\n<span class="kw">import</span> matplotlib.pyplot <span class="kw">as</span> plt\n\ndf = pd.<span class="fn">read_csv</span>(<span class="str">'students.csv'</span>)\n\n<span class="cm"># Basic exploration</span>\n<span class="fn">print</span>(df.<span class="fn">head</span>())         <span class="cm"># First 5 rows</span>\n<span class="fn">print</span>(df.<span class="fn">describe</span>())    <span class="cm"># Statistics</span>\n<span class="fn">print</span>(df.<span class="fn">isnull</span>().<span class="fn">sum</span>()) <span class="cm"># Missing values</span>\n\n<span class="cm"># Filter</span>\ncse = df[df[<span class="str">'branch'</span>] == <span class="str">'CSE'</span>]\n\n<span class="cm"># Visualize</span>\ndf[<span class="str">'marks'</span>].<span class="fn">hist</span>()\nplt.<span class="fn">title</span>(<span class="str">'Marks Distribution'</span>)\nplt.<span class="fn">show</span>()`,quiz:[{q:'Pandas kab use karte hain?',opts:['Web development ke liye','Data manipulation ke liye','Mobile apps ke liye','CSS ke liye'],ans:1},{q:'EDA ka full form?',opts:['Encryption','Exploratory Data Analysis','External DB Access','Event Driven Arch'],ans:1}]}},{id:22,icon:'🌊',title:'Microservices',level:'advanced',dur:'10 weeks',desc:'Break monoliths into services. Kafka, distributed systems.',chapter:{intro:'Microservices me <strong>ek badi app ko chhoti independent services</strong> me toda jaata hai. Netflix, Amazon, Uber sab microservices use karte hain. Scale karna easy hota hai!',concepts:['Monolith — Sab kuch ek app me (simple but hard to scale)','Microservices — Independent services jo alag deploy hoti hain','Service Communication — REST, gRPC, Message Queues','Apache Kafka — High throughput message streaming','API Gateway — Single entry point for all services','Service Discovery — Services apne aap dhundh sakein','Circuit Breaker — Cascade failures rokna'],code:`<span class="cm"># E-commerce microservices</span>\n\nAPI Gateway (:80)\n  ↓\n┌──────────────────────┐\n│ User Service (:3001) │→ PostgreSQL\n│ Product Svc  (:3002) │→ MongoDB\n│ Order Svc    (:3003) │→ PostgreSQL\n│ Payment Svc  (:3004) │→ Stripe\n│ Email Svc    (:3005) │→ SendGrid\n└──────────────────────┘\n         ↕ Kafka\n\n<span class="cm"># Order placed event:</span>\n<span class="cm"># → Payment Service: charge card</span>\n<span class="cm"># → Inventory: reduce stock</span>\n<span class="cm"># → Email: send confirmation</span>`,quiz:[{q:'Microservices ka advantage?',opts:['Ek server pe sab','Independent scaling aur deploy','Slow development','Single database'],ans:1},{q:'API Gateway kya karta hai?',opts:['Database manage karna','Single entry point provide karna','CSS serve karna','Images store karna'],ans:1}]}},{id:23,icon:'🕸️',title:'Computer Networks',level:'intermediate',dur:'4 weeks',desc:'TCP/IP, DNS, HTTP — understand how the internet works.',chapter:{intro:'Computer Networks samajhna <strong>har developer ke liye zarori hai</strong>. Jab app slow ho, ya connection fail ho — network knowledge kaam aata hai. Internet kaise kaam karta hai, jaano!',concepts:['IP Address — Network pe computer ki unique address','TCP vs UDP — Reliable (TCP) vs Fast (UDP) communication','DNS — Domain name to IP address convert karna','HTTP/HTTPS — Web communication protocol','OSI Model — 7 layers of networking','Common Ports — 80 HTTP, 443 HTTPS, 22 SSH, 3306 MySQL','Latency vs Bandwidth — Speed vs Capacity'],code:`<span class="cm"># Python TCP server</span>\n<span class="kw">import</span> socket\n\nserver = socket.<span class="fn">socket</span>(\n  socket.AF_INET, socket.SOCK_STREAM)\nserver.<span class="fn">bind</span>((<span class="str">'localhost'</span>, <span class="num">9999</span>))\nserver.<span class="fn">listen</span>(<span class="num">5</span>)\n\n<span class="fn">print</span>(<span class="str">"Server ready on :9999"</span>)\n<span class="kw">while</span> <span class="kw">True</span>:\n    conn, addr = server.<span class="fn">accept</span>()\n    <span class="fn">print</span>(<span class="str">f"Client: {addr}"</span>)\n    conn.<span class="fn">send</span>(<span class="str">b"Hello from server!"</span>)\n    conn.<span class="fn">close</span>()\n\n<span class="cm"># HTTP Request format:</span>\n<span class="cm"># GET /index.html HTTP/1.1</span>\n<span class="cm"># Host: www.example.com</span>`,quiz:[{q:'DNS kya karta hai?',opts:['Files store karta hai','Domain ko IP me convert karta hai','Emails bhejta hai','Code run karta hai'],ans:1},{q:'HTTPS HTTP se better kyon hai?',opts:['Faster hai','Encrypted/secure hai','Free hai','Naya hai'],ans:1}]}},{id:24,icon:'🎯',title:'Open Source Contribution',level:'advanced',dur:'Ongoing',desc:'Contribute to real projects. Build your GitHub profile.',chapter:{intro:'Open Source contribution se <strong>real world experience milta hai</strong> aur GitHub profile strong hoti hai. Recruiters GitHub dekh ke hire karte hain. Tu already GitHub use karta hai — ab contribute karo!',concepts:['Fork — Repo ki copy apne GitHub pe banana','Issue — Bug ya feature request raise karna','Pull Request — Apna code original repo me submit karna','Code Review — Dusron ka code review karna','Good First Issue — Beginners ke liye easy issues dhundho','README — Clear documentation likhna','License — MIT, Apache, GPL — code use rules'],code:`<span class="cm"># Open Source workflow</span>\n\n<span class="cm"># 1. Interesting repo dhundo</span>\n<span class="cm">#    github.com/explore</span>\n<span class="cm">#    Label filter: "good first issue"</span>\n\n<span class="cm"># 2. Fork karo (GitHub button)</span>\n\n<span class="cm"># 3. Clone apna fork</span>\ngit clone https://github.com/YOUR/repo\n\n<span class="cm"># 4. Feature branch banana</span>\ngit checkout -b fix/button-bug\n\n<span class="cm"># 5. Fix karo aur commit karo</span>\ngit add .\ngit commit -m <span class="str">"fix: button color on mobile"</span>\ngit push origin fix/button-bug\n\n<span class="cm"># 6. GitHub pe Pull Request open karo!</span>`,quiz:[{q:'Fork kya karta hai?',opts:['Repo delete karta hai','Repo copy apne account pe banata hai','Code run karta hai','Branch delete karta hai'],ans:1},{q:'PR kab open karte hain?',opts:['Code download ke liye','Apna code original repo me submit ke liye','Branch delete ke liye','Issue close ke liye'],ans:1}]}}];

let completed=new Set(JSON.parse(localStorage.getItem('cse_v2_done')||'[]'));
let currentFilter='all';

function renderTopics(){
  const filtered=currentFilter==='all'?topics:topics.filter(t=>t.level===currentFilter);
  document.getElementById('topics-grid').innerHTML=filtered.map(t=>`
    <div class="tcard ${completed.has(t.id)?'done':''}" onclick="openChapter(${t.id})">
      <div class="tcard-top"><div class="tcard-icon">${t.icon}</div><span class="tlevel lv-${t.level}">${t.level}</span></div>
      <div class="tcard-title">${t.title}</div>
      <div class="tcard-desc">${t.desc}</div>
      <div class="tcard-footer">
        <button class="open-btn" onclick="openChapter(${t.id});event.stopPropagation()">📖 Open Chapter</button>
        <span class="tcard-dur">${completed.has(t.id)?'<span class="done-badge">✓ Done</span>':'⏱ '+t.dur}</span>
      </div>
    </div>`).join('');
  updateStats();
}

function updateStats(){
  const done=completed.size,total=topics.length,pct=Math.round(done/total*100);
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-lbl').textContent=`${done} / ${total}`;
  document.getElementById('prog-chip').textContent=`${done}/${total}`;
}

function filterLevel(level,btn){
  currentFilter=level;
  document.querySelectorAll('.ltab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTopics();
}

function openChapter(id){
  const t=topics.find(x=>x.id===id);
  const c=t.chapter;
  const isDone=completed.has(id);
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-header">
      <div class="modal-icon">${t.icon}</div>
      <div class="modal-title">${t.title}</div>
      <div class="modal-subtitle">${t.level} · ${t.dur}</div>
    </div>
    <div class="chapter">
      <div class="ch-title">Introduction</div>
      <div class="ch-text">${c.intro}</div>
    </div>
    <div class="chapter">
      <div class="ch-title">Key Concepts</div>
      <ul class="concept-list">${c.concepts.map(con=>`<li>${con}</li>`).join('')}</ul>
    </div>
    <div class="chapter">
      <div class="ch-title">Code Example</div>
      <div class="code-block">${c.code}</div>
    </div>
    <div class="quiz-section">
      <div class="quiz-title">🧪 Quick Quiz — Test Yourself!</div>
      ${c.quiz.map((q,qi)=>`
        <div class="quiz-q">
          <div class="quiz-q-text">Q${qi+1}: ${q.q}</div>
          <div class="quiz-options">
            ${q.opts.map((o,oi)=>`<button class="qopt" onclick="checkAns(this,${oi},${q.ans})">${o}</button>`).join('')}
          </div>
        </div>`).join('')}
    </div>
    <div class="modal-footer">
      <button class="mark-done-btn ${isDone?'already':''}" onclick="toggleDone(${id})">
        ${isDone?'✓ Completed!':'✅ Mark as Done'}
      </button>
      <a class="res-link" href="https://www.youtube.com/@CodeWithHarry" target="_blank">📺 CodeWithHarry →</a>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow='';
}

function closeModalOutside(e){
  if(e.target===document.getElementById('modal-overlay'))closeModal();
}

function checkAns(btn,selected,correct){
  const opts=btn.parentElement.querySelectorAll('.qopt');
  opts.forEach(o=>o.disabled=true);
  if(selected===correct)btn.classList.add('correct');
  else{btn.classList.add('wrong');opts[correct].classList.add('correct');}
}

function toggleDone(id){
  if(completed.has(id))completed.delete(id);else completed.add(id);
  localStorage.setItem('cse_v2_done',JSON.stringify([...completed]));
  renderTopics();
  const btn=document.querySelector('.mark-done-btn');
  if(btn){const isDone=completed.has(id);btn.textContent=isDone?'✓ Completed!':'✅ Mark as Done';btn.className='mark-done-btn '+(isDone?'already':'');}
}

function renderTech(){
  document.getElementById('tech-grid').innerHTML=techs.map(t=>`
    <div class="tech-card">
      <div style="display:flex;align-items:center">
        <div class="tc-name">${t.name}</div>
        ${t.hot?'<span class="tc-hot">🔥 Hot</span>':''}
      </div>
      <div class="tc-cat">${t.cat}</div>
      <div class="tc-bar"><div class="tc-fill" style="width:0%;background:${t.color}" data-w="${t.trend}%"></div></div>
      <div class="tc-pct">${t.trend}% demand</div>
    </div>`).join('');
  setTimeout(()=>document.querySelectorAll('.tc-fill').forEach(el=>el.style.width=el.dataset.w),100);
}

function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='tech')renderTech();
}

renderTopics();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
